<!-- REGISTRATION FORM -->

<div class="container mt-5">

<h2 class="text-center">Event Registration</h2>

<form class="mt-4">

<div class="mb-3">

<label class="form-label">Full Name</label>

<input type="text" class="form-control" placeholder="Enter your name">

</div>


<div class="mb-3">

<label class="form-label">Email Address</label>

<input type="email" class="form-control" placeholder="Enter your email">

</div>


<div class="mb-3">

<label class="form-label">Phone Number</label>

<input type="text" class="form-control" placeholder="Enter phone number">

</div>


<div class="mb-3">

<label class="form-label">Select Category</label>

<select class="form-control">

<option>Solo Singing</option>
<option>Duet Singing</option>
<option>Group Singing</option>

</select>

</div>


<div class="mb-3">

<label class="form-label">Song Name</label>

<input type="text" class="form-control" placeholder="Enter song name">

</div>


<button class="btn btn-primary">Submit Registration</button>

</form>

</div>


<footer class="bg-dark text-white text-center p-3 mt-5">

<p>© 2026 College Singing Fest</p>

</footer>
